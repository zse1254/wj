name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Get D1 database ID
        id: d1
        run: |
          npx wrangler d1 list --json > d1-list.json 2>&1 || true
          cat d1-list.json
          # Try to extract the database ID for wj-db
          DB_ID=$(node -e "
            const data = require('fs').readFileSync('d1-list.json','utf8');
            try {
              const list = JSON.parse(data);
              const db = list.find(d => d.name === 'wj-db' || d.database_name === 'wj-db');
              if (db) console.log(db.uuid || db.database_id);
            } catch(e) { console.error(e.message); }
          ")
          if [ -n "$DB_ID" ]; then
            echo "D1 database ID: $DB_ID"
            echo "DB_ID=$DB_ID" >> $GITHUB_ENV
          else
            echo "Creating new D1 database..."
            npx wrangler d1 create wj-db --json > d1-create.json 2>&1 || true
            cat d1-create.json
            DB_ID=$(node -e "
              const data = require('fs').readFileSync('d1-create.json','utf8');
              try {
                const result = JSON.parse(data);
                console.log(result.uuid || result.database_id);
              } catch(e) { console.error(e.message); }
            ")
            if [ -n "$DB_ID" ]; then
              echo "Created D1 database ID: $DB_ID"
              echo "DB_ID=$DB_ID" >> $GITHUB_ENV
            fi
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update wrangler.toml with D1 binding
        run: |
          if [ -n "$DB_ID" ]; then
            cat >> wrangler.toml << EOF

          [[d1_databases]]
          binding = "DB"
          database_name = "wj-db"
          database_id = "$DB_ID"
          EOF
            echo "Added D1 binding to wrangler.toml"
          else
            echo "Warning: No D1 database ID found"
          fi

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Prepare Pages output
        run: |
          cp -r .open-next pages-output
          cp -r .open-next/assets/* pages-output/
          rm -rf pages-output/assets
          mv pages-output/worker.js pages-output/_worker.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy pages-output --project-name wj --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
