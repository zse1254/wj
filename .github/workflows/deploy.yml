name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Get D1 database ID
        id: d1
        run: |
          OUTPUT=$(node scripts/get-d1-id.mjs 2>&1) || true
          echo "$OUTPUT"
          DB_ID=$(echo "$OUTPUT" | grep -oE '[A-Z_]+_DB_ID=[a-f0-9-]+' | head -1 | grep -oE '[a-f0-9-]{20,}')
          if [ -n "$DB_ID" ]; then
            echo "DB_ID=$DB_ID" >> $GITHUB_ENV
            echo "Found D1 database: $DB_ID"
          else
            echo "Warning: Could not find D1 database"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update wrangler.toml with D1 binding
        run: |
          if [ -n "$DB_ID" ]; then
            cat >> wrangler.toml << EOF

          [[d1_databases]]
          binding = "DB"
          database_name = "wj-db"
          database_id = "$DB_ID"
          EOF
            echo "Added D1 binding to wrangler.toml"
          else
            echo "Warning: No D1 database ID found"
          fi

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Prepare Pages output
        run: |
          # 1. Copy entire .open-next to pages-output/.open-next
          mkdir -p pages-output
          cp -r .open-next pages-output/.open-next
          # 2. Move static assets to root (served by Pages platform)
          cp -r pages-output/.open-next/assets/* pages-output/
          rm -rf pages-output/.open-next/assets
          # 3. Move worker dependencies to root
          for d in pages-output/.open-next/*/; do
            base=$(basename "$d")
            [ "$base" = "assets" ] && continue
            cp -r "$d" "pages-output/$base"
          done
          for f in pages-output/.open-next/*.js pages-output/.open-next/*.mjs; do
            [ -f "$f" ] && cp "$f" pages-output/
          done
          rm -rf pages-output/.open-next
          # 4. Create Pages Function wrapper (handles dynamic routes)
          mkdir -p pages-output/functions
          cat > pages-output/functions/[[path]].js << 'WRAPPER'
            import worker from '../worker.js'
            export const onRequest = async (ctx) => {
              const { request, env, ctx: c } = ctx
              try { return await worker.fetch(request, env, c) }
              catch (err) { return new Response(JSON.stringify({ error: String(err) }), { status: 500, headers: { 'Content-Type': 'application/json' } }) }
            }
          WRAPPER

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy pages-output --project-name wj --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Initialize D1 database (tables + admin seed)
        run: node scripts/init-d1.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
