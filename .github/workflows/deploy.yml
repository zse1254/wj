name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Find output directory
        run: |
          echo "=== Looking for build output ==="
          ls -la .open-next 2>/dev/null && echo ".open-next exists" || echo "No .open-next"
          ls -la .vercel 2>/dev/null && echo ".vercel exists" || echo "No .vercel"
          ls -la .open-next/assets/ 2>/dev/null | head -5 && echo "assets found" || echo "No assets"
          # Also check if output went somewhere else
          echo "=== Checking all hidden dirs ==="
          ls -d .* 2>/dev/null | head -10

      - name: Output structure
        run: |
          if [ -d ".open-next/assets" ]; then
            echo "Using .open-next/assets"
            ls .open-next/assets/ | head -20
            npx wrangler pages deploy .open-next/assets --project-name wj --branch main
          elif [ -d ".vercel/output/static" ]; then
            echo "Using .vercel/output/static"
            npx wrangler pages deploy .vercel/output/static --project-name wj --branch main
          else
            echo "ERROR: No build output found"
            find . -name "index.html" -type f 2>/dev/null | head -10
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
