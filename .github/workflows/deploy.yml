name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check wrangler version
        run: npx wrangler --version

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Debug output directory
        run: ls -la .vercel/output/static/ | head -20

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy .vercel/output/static --project-name wj --branch main 2>&1 | tee deploy-output.txt
          echo "EXIT_CODE=$?" >> $GITHUB_ENV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload deploy logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs
          path: deploy-output.txt
