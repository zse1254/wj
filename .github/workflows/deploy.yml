name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Prepare Pages output
        run: |
          # Copy entire .open-next as base
          cp -r .open-next pages-output
          # Move static assets to root
          cp -r .open-next/assets/* pages-output/
          rm -rf pages-output/assets
          # Rename worker.js to _worker.js (Pages convention)
          mv pages-output/worker.js pages-output/_worker.js
          echo "=== pages-output contents ==="
          ls -la pages-output/ | head -20
          echo "=== _worker.js ==="
          head -5 pages-output/_worker.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy pages-output --project-name wj --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
