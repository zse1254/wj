name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Get D1 database ID
        id: d1
        run: |
          OUTPUT=$(node scripts/get-d1-id.mjs 2>&1) || true
          echo "$OUTPUT"
          DB_ID=$(echo "$OUTPUT" | grep -oE '[A-Z_]+_DB_ID=[a-f0-9-]+' | head -1 | grep -oE '[a-f0-9-]{20,}')
          if [ -n "$DB_ID" ]; then
            echo "DB_ID=$DB_ID" >> $GITHUB_ENV
            echo "Found D1 database: $DB_ID"
          else
            echo "Warning: Could not find D1 database"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update wrangler.toml with D1 binding
        run: |
          if [ -n "$DB_ID" ]; then
            cat >> wrangler.toml << EOF

          [[d1_databases]]
          binding = "DB"
          database_name = "wj-db"
          database_id = "$DB_ID"
          EOF
            echo "Added D1 binding to wrangler.toml"
          else
            echo "Warning: No D1 database ID found"
          fi

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Prepare Pages output
        run: |
          cp -r .open-next pages-output
          cp -r .open-next/assets/* pages-output/
          rm -rf pages-output/assets
          mv pages-output/worker.js pages-output/_worker.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy pages-output --project-name wj --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Initialize D1 database (tables + admin seed)
        run: node scripts/init-d1.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
